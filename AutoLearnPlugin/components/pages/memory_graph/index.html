<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Memory Graph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--langbot-bg, #fff);
      color: var(--langbot-text, #0a0a0a);
      padding: 20px;
    }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; }
    .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat-card {
      flex: 1; min-width: 120px; padding: 12px 16px;
      background: var(--langbot-bg-card, #f8fafc);
      border: 1px solid var(--langbot-border, #e4e4e7);
      border-radius: 10px;
    }
    .stat-card .label { font-size: 12px; color: var(--langbot-text-muted, #71717a); }
    .stat-card .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
    .layout { display: grid; grid-template-columns: 1fr 280px; gap: 16px; }
    @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
    #graph-canvas {
      width: 100%; height: 480px;
      border: 1px solid var(--langbot-border, #e4e4e7);
      border-radius: 10px; background: var(--langbot-bg-card, #f8fafc);
      cursor: grab;
    }
    .sidebar {
      border: 1px solid var(--langbot-border, #e4e4e7);
      border-radius: 10px; padding: 14px;
      background: var(--langbot-bg-card, #f8fafc);
      max-height: 480px; overflow-y: auto;
    }
    .sidebar h3 { font-size: 14px; margin-bottom: 10px; }
    .trait-bar { margin-bottom: 8px; }
    .trait-bar .name { font-size: 12px; display: flex; justify-content: space-between; }
    .trait-bar .bar { height: 6px; background: var(--langbot-border, #e4e4e7); border-radius: 3px; margin-top: 3px; }
    .trait-bar .fill { height: 100%; background: var(--langbot-accent, #2563eb); border-radius: 3px; }
    .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .legend span { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
    .type-person { background: #dbeafe; color: #1d4ed8; }
    .type-group { background: #dcfce7; color: #15803d; }
    .type-topic { background: #fef3c7; color: #b45309; }
    .type-memory { background: #fce7f3; color: #be185d; }
    .type-slang { background: #ede9fe; color: #6d28d9; }
    #node-detail { font-size: 12px; color: var(--langbot-text-muted, #71717a); margin-top: 10px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="header">
    <h1 data-i18n="title">Memory Graph</h1>
    <button class="btn" id="refreshBtn" style="padding:6px 14px;border:none;border-radius:8px;background:var(--langbot-accent,#2563eb);color:#fff;cursor:pointer;font-size:13px;">Refresh</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="layout">
    <canvas id="graph-canvas"></canvas>
    <div class="sidebar">
      <h3 data-i18n="personality">Personality</h3>
      <div id="traits"></div>
      <div class="legend">
        <span class="type-person">person</span>
        <span class="type-group">group</span>
        <span class="type-topic">topic</span>
        <span class="type-memory">memory</span>
        <span class="type-slang">slang</span>
      </div>
      <div id="node-detail" data-i18n="clickHint">Click a node to see details</div>
    </div>
  </div>

  <script src="/api/v1/plugins/_sdk/page-sdk.js"></script>
  <script>
    var TYPE_COLORS = {
      person: '#2563eb', group: '#16a34a', topic: '#d97706',
      memory: '#db2777', slang: '#7c3aed', unknown: '#6b7280'
    };
    var nodes = [], edges = [], simNodes = [];
    var selectedNode = null;
    var canvas, ctx, animId;

    function renderStats(summary) {
      var el = document.getElementById('stats');
      var items = [
        { label: 'Messages', value: summary.messages_processed },
        { label: 'Users', value: summary.users_tracked },
        { label: 'Relations', value: summary.relationships },
        { label: 'Nodes', value: summary.graph_nodes },
        { label: 'Edges', value: summary.graph_edges }
      ];
      el.innerHTML = items.map(function(i) {
        return '<div class="stat-card"><div class="label">' + i.label + '</div><div class="value">' + i.value + '</div></div>';
      }).join('');
    }

    function renderTraits(traits) {
      var el = document.getElementById('traits');
      var names = { warmth: 'Warmth', humor: 'Humor', formality: 'Formality', empathy: 'Empathy', curiosity: 'Curiosity' };
      el.innerHTML = Object.keys(traits).map(function(k) {
        var pct = Math.round(traits[k] * 100);
        return '<div class="trait-bar"><div class="name"><span>' + (names[k] || k) + '</span><span>' + pct + '%</span></div>'
          + '<div class="bar"><div class="fill" style="width:' + pct + '%"></div></div></div>';
      }).join('');
    }

    function initSimulation(graphNodes, graphEdges) {
      canvas = document.getElementById('graph-canvas');
      ctx = canvas.getContext('2d');
      canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1);
      canvas.height = canvas.clientHeight * (window.devicePixelRatio || 1);
      ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);

      var w = canvas.clientWidth, h = canvas.clientHeight;
      simNodes = graphNodes.map(function(n, i) {
        var angle = (i / Math.max(graphNodes.length, 1)) * Math.PI * 2;
        var r = Math.min(w, h) * 0.3;
        return {
          id: n.id, type: n.type || 'unknown', label: n.label || n.id,
          weight: n.weight || 0.5, content: n.content || '',
          x: w / 2 + Math.cos(angle) * r * Math.random(),
          y: h / 2 + Math.sin(angle) * r * Math.random(),
          vx: 0, vy: 0
        };
      });

      edges = graphEdges;
      var nodeMap = {};
      simNodes.forEach(function(n) { nodeMap[n.id] = n; });

      function tick() {
        simNodes.forEach(function(n) {
          n.vx += (w / 2 - n.x) * 0.001;
          n.vy += (h / 2 - n.y) * 0.001;
        });
        for (var i = 0; i < simNodes.length; i++) {
          for (var j = i + 1; j < simNodes.length; j++) {
            var a = simNodes[i], b = simNodes[j];
            var dx = b.x - a.x, dy = b.y - a.y;
            var dist = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
            var force = 800 / (dist * dist);
            a.vx -= (dx / dist) * force; a.vy -= (dy / dist) * force;
            b.vx += (dx / dist) * force; b.vy += (dy / dist) * force;
          }
        }
        edges.forEach(function(e) {
          var s = nodeMap[e.source], t = nodeMap[e.target];
          if (!s || !t) return;
          var dx = t.x - s.x, dy = t.y - s.y;
          var dist = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
          var force = (dist - 80) * 0.005;
          s.vx += (dx / dist) * force; s.vy += (dy / dist) * force;
          t.vx -= (dx / dist) * force; t.vy -= (dy / dist) * force;
        });
        simNodes.forEach(function(n) {
          n.vx *= 0.85; n.vy *= 0.85;
          n.x += n.vx; n.y += n.vy;
          n.x = Math.max(20, Math.min(w - 20, n.x));
          n.y = Math.max(20, Math.min(h - 20, n.y));
        });
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);
        var nodeMap2 = {};
        simNodes.forEach(function(n) { nodeMap2[n.id] = n; });

        edges.forEach(function(e) {
          var s = nodeMap2[e.source], t = nodeMap2[e.target];
          if (!s || !t) return;
          ctx.beginPath();
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(t.x, t.y);
          ctx.strokeStyle = 'rgba(150,150,150,0.3)';
          ctx.lineWidth = 1;
          ctx.stroke();
        });

        simNodes.forEach(function(n) {
          var radius = 6 + n.weight * 8;
          var color = TYPE_COLORS[n.type] || TYPE_COLORS.unknown;
          ctx.beginPath();
          ctx.arc(n.x, n.y, radius, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
          if (selectedNode && selectedNode.id === n.id) {
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
          }
          ctx.fillStyle = getComputedStyle(document.body).color;
          ctx.font = '11px sans-serif';
          ctx.fillText(n.label.substring(0, 12), n.x + radius + 3, n.y + 4);
        });
      }

      function loop() {
        tick(); draw();
        animId = requestAnimationFrame(loop);
      }
      if (animId) cancelAnimationFrame(animId);
      loop();

      canvas.onclick = function(ev) {
        var rect = canvas.getBoundingClientRect();
        var mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
        selectedNode = null;
        for (var i = simNodes.length - 1; i >= 0; i--) {
          var n = simNodes[i];
          var r = 6 + n.weight * 8;
          var dx = mx - n.x, dy = my - n.y;
          if (dx * dx + dy * dy < r * r) {
            selectedNode = n;
            break;
          }
        }
        var detail = document.getElementById('node-detail');
        if (selectedNode) {
          detail.innerHTML = '<b>' + selectedNode.label + '</b><br>type: ' + selectedNode.type
            + '<br>weight: ' + selectedNode.weight.toFixed(2)
            + (selectedNode.content ? '<br>content: ' + selectedNode.content : '');
        } else {
          detail.textContent = langbot.t('clickHint', 'Click a node to see details');
        }
      };
    }

    async function loadAll() {
      var summary = await langbot.api('/summary', null, 'GET');
      var graph = await langbot.api('/graph', null, 'GET');
      renderStats(summary);
      renderTraits(summary.personality);
      initSimulation(graph.nodes || [], graph.edges || []);
    }

    langbot.onReady(function() {
      loadAll();
      document.getElementById('refreshBtn').addEventListener('click', loadAll);
    });
  </script>
</body>
</html>
